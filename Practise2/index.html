<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practise 2</title>
  </head>
  <body>
    <header>
      <h1>Practise 2</h1>
    </header>
    <main>
      <div id="temp"></div>
      <div id="desc"></div>

      <button id="generate">Create JSON</button>
    </main>

    <script>
      //Level 1 - Task 3
      let apiKey = "a35d46c6b46b782284752d669c1404ac";
      let city = "Kyiv";
      let url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

      fetch(url)
        .then((response) => response.json())
        .then((data) => {
          const temperature = data.main.temp;
          const description = data.weather[0].description;

          document.getElementById("temp").textContent = `Temperature: ${temperature} °C`;
          document.getElementById("desc").textContent = `Description: ${description}`;
        })
        .catch((error) => {
          document.getElementById("temp").textContent = "Failed to load temperature."
          document.getElementById("desc").textContent = "Failed to load weather description."
          console.log("Error:", error);
        });

        //Level 2 - Task 3
        document.getElementById("generate").addEventListener("click", () => {
          const data = {
            name: "Ivan",
            age: 20,
            hobbies: ["coding", "football", "music"]
          };

          const json = JSON.stringify(data, null, 2);

          const blob = new Blob([json], { type: "application/json" });

          const url = URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = url;
          a.download = "data.json";
          a.click();

          URL.revokeObjectURL(url);
        });
    </script>
  </body>
</html>
